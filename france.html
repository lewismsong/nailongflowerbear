<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>france 🇫🇷</title>
<meta name="theme-color" content="#FFF4D6" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇫🇷</text></svg>" />
<link rel="stylesheet" href="assets/css/styles.css?v=4" />
<link rel="stylesheet" href="assets/css/france.css?v=1" />
</head>
<body class="france-page">
<main class="france-wrap">
  <header class="france-header">
    <div>
      <p class="france-eyebrow">🐻‍❄️ + 🐻 go to</p>
      <h1>france</h1>
      <p class="france-sub">aug 13 - aug 27 , 2026(</p>
    </div>
    <div class="france-count" id="france-count"></div>
  </header>

  <ol class="days" id="days"></ol>

  <section class="resv" aria-label="reservations">
    <h2 class="resv-title">reservations</h2>
    <p class="resv-sub">everything everywhere all at once 🎒</p>
    <div class="resv-grid">
      <div class="resv-col" data-type="train">
        <h3 class="resv-head">🚆 trains</h3>
        <ul class="resv-list" id="resv-train"></ul>
        <form class="resv-form" data-type="train">
          <input class="resv-input" name="title" placeholder="title: e.g. lyon to toulon" maxlength="80" required />
          <input class="resv-input" name="when" placeholder="date & time: e.g. aug 21, 1:02pm" maxlength="60" />
          <input class="resv-input" name="address" placeholder="address (opens in maps)" maxlength="120" />
          <input class="resv-input" name="code" placeholder="confirmation # (optional)" maxlength="40" />
          <button class="resv-add" type="submit">add train</button>
        </form>
      </div>
      <div class="resv-col" data-type="hotel">
        <h3 class="resv-head">🏨 hotels</h3>
        <ul class="resv-list" id="resv-hotel"></ul>
        <form class="resv-form" data-type="hotel">
          <input class="resv-input" name="title" placeholder="title: e.g. hôtel alexandrine" maxlength="80" required />
          <input class="resv-input" name="when" placeholder="dates: e.g. aug 13-16" maxlength="60" />
          <input class="resv-input" name="address" placeholder="address (opens in maps)" maxlength="120" />
          <input class="resv-input" name="code" placeholder="confirmation # (optional)" maxlength="40" />
          <button class="resv-add" type="submit">add hotel</button>
        </form>
      </div>
      <div class="resv-col" data-type="restaurant">
        <h3 class="resv-head">🍽️ restaurants</h3>
        <ul class="resv-list" id="resv-restaurant"></ul>
        <form class="resv-form" data-type="restaurant">
          <input class="resv-input" name="title" placeholder="title: e.g. bouillon pigalle" maxlength="80" required />
          <input class="resv-input" name="when" placeholder="date & time: e.g. aug 14, 12pm" maxlength="60" />
          <input class="resv-input" name="address" placeholder="address (opens in maps)" maxlength="120" />
          <input class="resv-input" name="code" placeholder="confirmation # (optional)" maxlength="40" />
          <button class="resv-add" type="submit">add restaurant</button>
        </form>
      </div>
    </div>
  </section>

  <p id="france-error" class="france-error" role="status"></p>
</main>

<bear-tab-nav current="france"></bear-tab-nav>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="assets/js/config.js?v=1"></script>
<script src="assets/js/france.js?v=1"></script>
<script src="assets/js/navigation.js?v=6"></script>
</body>
</html>
